services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-neko}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-neko}
      POSTGRES_DB: ${POSTGRES_DB:-neko}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-neko}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  nats:
    image: nats:2.12-alpine
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"

  victoriametrics:
    image: victoriametrics/victoria-metrics:v1.145.0
    command: ["-storageDataPath=/vmdata", "-retentionPeriod=3"]
    ports:
      - "8428:8428"
    volumes:
      - vmdata:/vmdata

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.154.0
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./deploy/otel-collector.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP

volumes:
  pgdata:
  vmdata:

# Full-stack deployment overlay: builds and runs the Neko API + Worker + Web
# alongside the data/infrastructure services from docker-compose.yml.
#
# Usage (or just run scripts/deploy-ubuntu.sh which wraps this):
#   docker compose -f docker-compose.yml -f docker-compose.deploy.yml up -d --build
#
# Configuration is read from .env (see .env.example). Secrets like
# POSTGRES_PASSWORD and NEKO_ADMIN_PASSWORD should be set there (the deploy
# script generates them automatically on first run).
services:
  api:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      NEKO_HTTP_ADDR: ":8080"
      NEKO_ENV: production
      NEKO_STORE: postgres
      NEKO_AUTH: "on"
      NEKO_SEED: ${NEKO_SEED:-true}
      NEKO_ADMIN_EMAIL: ${NEKO_ADMIN_EMAIL:-admin@neko.io}
      NEKO_ADMIN_PASSWORD: ${NEKO_ADMIN_PASSWORD:-neko12345}
      DATABASE_URL: postgres://${POSTGRES_USER:-neko}:${POSTGRES_PASSWORD:-neko}@postgres:5432/${POSTGRES_DB:-neko}?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      NATS_URL: nats://nats:4222
      VM_URL: http://victoriametrics:8428
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    ports:
      - "${NEKO_API_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./backend
    entrypoint: ["/app/worker"]
    restart: unless-stopped
    environment:
      NEKO_ENV: production
      NEKO_STORE: postgres
      DATABASE_URL: postgres://${POSTGRES_USER:-neko}:${POSTGRES_PASSWORD:-neko}@postgres:5432/${POSTGRES_DB:-neko}?sslmode=disable
      NATS_URL: nats://nats:4222
      VM_URL: http://victoriametrics:8428
    depends_on:
      postgres:
        condition: service_healthy

  # RouterOS v7 REST simulator — lets the platform demonstrate real device
  # management (enroll → poll → config push) without physical hardware.
  rosim:
    build:
      context: ./backend
    entrypoint: ["/app/rosim"]
    restart: unless-stopped
    environment:
      ROSIM_ADDR: ":8729"
      ROSIM_BOARD: "CCR2004-1G-12S+2XS"
      ROSIM_VERSION: "7.14.3"

  web:
    build:
      context: ./web
      args:
        # NEXT_PUBLIC_* must be baked at build time for client bundles, so the
        # browser-facing API URL is passed as a build arg.
        NEXT_PUBLIC_API_BASE_URL: ${NEKO_PUBLIC_API_URL:-http://localhost:8080}
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEKO_PUBLIC_API_URL:-http://localhost:8080}
    ports:
      - "${NEKO_WEB_PORT:-3000}:3000"
    depends_on:
      - api
